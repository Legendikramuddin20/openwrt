name: Build RE650 v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison \
            g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev \
            python3-setuptools rsync swig \
            unzip zlib1g-dev file wget curl

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_tplink_re650-v2=y" >> .config
          make defconfig

      - name: Download
        run: make -j4 download

      - name: Build
        run: make -j2 world

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-re650v2
          path: bin/targets/ramips/mt7621/*re650*
          retention-days: 7
