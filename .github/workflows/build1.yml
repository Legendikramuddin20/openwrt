name: Build RE650 v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      # 1. Pull the official OpenWrt 24.10.7 source tree into the root directory
      - name: Checkout Official OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: v24.10.7

      # 2. Pull YOUR repository into a separate subfolder named 'openwrt'
      - name: Checkout Your Custom Repo
        uses: actions/checkout@v4
        with:
          path: openwrt

      # 3. Copy using your exact path straight into the official OpenWrt build tree
      - name: Inject Custom DTS
        run: |
          cp openwrt/target/linux/ramips/dts/mt7621_tplink_re650-v2.dts target/linux/ramips/dts/mt7621_tplink_re650-v2.dts

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison \
            g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev \
            python3-setuptools rsync swig \
            unzip zlib1g-dev file wget curl

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 4. Your original, un-modified configuration block
      - name: Configure
        run: |
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_tplink_re650-v2=y" >> .config
          make defconfig

      - name: Download
        run: make -j4 download

      - name: Build
        run: make -j2 world

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-re650v2
          path: bin/targets/ramips/mt7621/*re650*
          retention-days: 7
